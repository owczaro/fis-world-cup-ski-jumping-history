name: Update Season Data

on:
  schedule:
    # 1 kwietnia o 06:00 UTC co roku
    - cron: '0 6 1 4 *'
  workflow_dispatch:
    inputs:
      season:
        description: 'Sezon do aktualizacji (np. 2025_2026). Pusty = auto.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run - nie commituj zmian'
        required: false
        default: 'false'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pdfplumber

      - name: Run updater
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.season }}" ]; then
            ARGS="$ARGS --season ${{ github.event.inputs.season }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python .github/scripts/update_season.py $ARGS --repo .

      - name: Commit and push
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Brak zmian do commita"
          else
            SEASON=$(python3 -c "
          from datetime import date
          y = date.today().year
          y1 = y-1 if date.today().month < 6 else y
          print(f'{y1}/{y1+1}')
          ")
            git commit -m "Update season ${SEASON} standings [auto]"
            git push
          fi
